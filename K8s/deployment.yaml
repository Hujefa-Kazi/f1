apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp3
spec:  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxunavailable: 1
      maxSurge: 2
  replicas: 5
  selector:
    matchLabels:
      app: myapp3
  template:
    metadata:
      labels:
        app: myapp3
    spec: 
      containers:
        - name: myapp3
          image: httpd
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
          - containerPort: 80